<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registration - Auto Attendance</title>
    <link rel="icon" href="./favicon.svg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <header class="appbar">
        <div class="brand"><img src="./logo.svg" alt="Auto Attendance" /></div>
      </header>
      <section class="card">
        <div class="section-title"><h3>Registration</h3><span class="pill muted">Create account</span></div>
        <form id="regForm" class="grid-2">
          <label>Name
            <input id="regName" placeholder="Enter Name" required />
          </label>
          <label>ID
            <input id="regId" placeholder="Enter ID" required />
          </label>
          <label>Password
            <input id="regPassword" type="password" placeholder="Enter Password" required />
          </label>
          <label>Role
            <select id="regRole">
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
              <option value="admin">Admin</option>
            </select>
          </label>
          <button type="submit" class="button">Register</button>
          <button id="toLogin" type="button" class="button" style="background:#334155">Go to Login</button>
        </form>
        <p id="regMsg" class="muted"></p>
      </section>
    </main>
    <script type="module">
      import { RegistrationPage } from './app-shared.js';
      new RegistrationPage().init();
    </script>
  </body>
  </html>
