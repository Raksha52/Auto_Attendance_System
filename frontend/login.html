<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Auto Attendance</title>
    <link rel="icon" href="./favicon.svg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <header class="appbar">
        <div class="brand"><img src="./logo.svg" alt="Auto Attendance" /></div>
      </header>
      <section class="card">
        <div class="section-title"><h3>Login</h3><span class="pill muted">Choose role</span></div>
        <form id="loginForm" class="grid-2">
          <label>Enter ID or Email
            <input id="identifier" placeholder="Enter ID or Email" required />
          </label>
          <label>Password
            <input id="password" type="password" placeholder="Enter Password" required />
          </label>
          <fieldset>
            <label><input type="radio" name="role" value="student" checked /> Student</label>
            <label><input type="radio" name="role" value="teacher" /> Teacher</label>
            <label><input type="radio" name="role" value="admin" /> Admin</label>
          </fieldset>
          <button type="submit" class="button">Continue</button>
        </form>
        <p id="msg" class="muted"></p>
      </section>
    </main>
    <script type="module">
      import { LoginPage } from './app-shared.js';
      new LoginPage().init();
    </script>
  </body>
</html>
